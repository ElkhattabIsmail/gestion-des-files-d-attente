<!DOCTYPE html>
<html lang="fr">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexto - Votre Ticket</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="Style.css">

</head>
<body>

    <header class="container">
        <nav class="navbar">    
            <div class="logo">N<span>Exto</span></div>
        </nav>
    </header>

    

    <main class="container ticket-page">
        <div class="success-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        <h1 class="ticket-title">Ticket validé</h1>
        <p class="subtitle subtitle-no-margin">Votre demande a bien été enregistrée.</p>

        <div class="ticket-box">
            <div class="ticket-number">B12</div>
            <div class="ticket-divider"></div>

            <div class="ticket-meta">
                <div>
                    <div class="meta-label">Service</div>
                    <div class="meta-value">État Civil</div>
                </div>
                <div class="ticket-meta-right">
                    <div class="meta-label">Heure</div>
                    <div class="meta-value">14:23</div>
                </div>
            </div>

            <div class="waiting-message">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                Veuillez attendre votre tour
            </div>
        </div>

        <a href="Nexto_Projet.html" class="btn btn-outline btn-full mb-2"><span><-</span> Routour à l'accueil</a>

        <a href="Liste d'attente.html" class="btn btn-outline btn-full mb-2">  Voir La liste D'attente</a>

        <p class="ticket-note">Conservez ce numéro, il vous sera demandé au guichet.</p>
    </main>
</body>
</html>

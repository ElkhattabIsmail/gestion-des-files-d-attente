<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexto - Prendre un ticket</title>

    <link rel="stylesheet" href="Style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
</head>
<body>

   <div class="container">
        <div class="navbar">
            <div class="logo">N<span>Exto</span></div>
            <div class="nav-links">
                <a href="#">Accueil</a>
                <a href="#">Contact</a>
            </div>
    </div>
    
 

    <main class="container selection-page text-center">
        <h1>Bienvenue</h1>
        <p class="subtitle">Sélectionnez le motif de votre visite aujourd'hui</p>

        <div class="services-list">
            <a href="ticket.html" class="service-link">
                <div class="service-card">
                    <div class="service-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="16" rx="2"></rect>
                            <circle cx="9" cy="10" r="2"></circle>
                            <line x1="15" y1="8" x2="19" y2="8"></line>
                            <line x1="15" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </div>
                    <span class="service-name">Carte d'identité / Passeport</span>
                </div>
            </a>

            <a href="ticket.html" class="service-link">
                <div class="service-card">
                    <div class="service-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2"></rect>
                            <path d="M9 3v18"></path>
                        </svg>
                    </div>
                    <span class="service-name">Permis de conduire</span>
                </div>
            </a>

            <a href="ticket.html" class="service-link">
                <div class="service-card">
                    <div class="service-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        </svg>
                    </div>
                    <span class="service-name">Certificat de résidence</span>
                </div>
            </a>
        </div>

        <div class="info-box">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="16" x2="12" y2="12"></line>
                <line x1="12" y1="8" x2="12.01" y2="8"></line>
            </svg>
            Veuillez patienter dans la salle après avoir généré votre ticket.
        </div>
    </main>
</body>
</html>
